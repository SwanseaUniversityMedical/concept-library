name: 'Issue States/open/close'

on:
  project_card:
    types: [created, edited, moved]

permissions:
  issues: write
  pull-requests: write
  repository-projects: read

jobs:
  action:
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/issue-states@v2
        with:
          github-token: ${{ github.token }}
          open-issue-columns: ''
          closed-issue-columns: 'Done / Deployed'
          log-output: false
